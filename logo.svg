<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#0B0F14"></rect>

  <!-- Stash tray -->
  <rect x="40" y="120" width="120" height="30" rx="6" fill="#1F2937"></rect>
  <rect x="50" y="110" width="100" height="20" rx="4" fill="#374151"></rect>

  <!-- File -->
  <rect x="60" y="40" width="80" height="90" rx="8" fill="#111827" stroke="#4B5563" stroke-width="2"></rect>

  <!-- Fold corner -->
  <path d="M120 40 L140 60 L120 60 Z" fill="#374151"></path>

  <!-- Diff lines -->
  <line x1="75" y1="70" x2="125" y2="70" stroke="#9CA3AF" stroke-width="2"></line>
  <line x1="75" y1="90" x2="110" y2="90" stroke="#9CA3AF" stroke-width="2"></line>

  <!-- Changed line (highlight) -->
  <line x1="75" y1="110" x2="125" y2="110" stroke="#22C55E" stroke-width="3"></line>

  <!-- Arrow into stash -->
  <path d="M100 130 L100 155" stroke="#22C55E" stroke-width="3"></path>
  <path d="M92 147 L100 155 L108 147" stroke="#22C55E" stroke-width="3" fill="none"></path>

</svg>